<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Smart Error Archiver - Modern knowledge base and spaced-repetition learning system." />

  <!-- Content Security Policy: Robust configuration for B.E.R.R.S. stack (Bun, Elysia, React, Rolldown, Supabase) -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://*.supabase.co; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' http://localhost:* ws://localhost:* https://*.supabase.co wss://*.supabase.co; img-src 'self' data: blob: https://*.supabase.co; frame-src 'self' https://*.supabase.co;" />

  <link rel="icon" type="image/svg+xml" href="/vite.svg" />

  <!-- Preconnect for performance and font stability -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&family=Manrope:wght@400;500;700;800&family=Outfit:wght@400;500;700;800;900&display=swap"
    rel="stylesheet" />

  <title>Smart Archiver V2</title>
</head>

<body>
  <!-- Theme initialization - prevents FOUC by applying theme before React hydrates -->
  <script>
    (function() {
      try {
        var stored = localStorage.getItem('user-settings-storage');
        var parsed = stored ? JSON.parse(stored) : null;
        var state = parsed && parsed.state ? parsed.state : null;
        var prefs = state && state.preferences ? state.preferences : null;
        var theme = prefs && prefs.theme ? prefs.theme : null;
        
        var mode = theme && theme.mode ? theme.mode : 'system';
        var lightTheme = theme && theme.lightTheme ? theme.lightTheme : 'liquid-light';
        var darkTheme = theme && theme.darkTheme ? theme.darkTheme : 'liquid-dark';
        
        var isDark = mode === 'dark' || (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        var resolvedTheme = isDark ? darkTheme : lightTheme;
        
        document.documentElement.setAttribute('data-theme', resolvedTheme);
        document.documentElement.classList.add('sea'); // Add shell class for consistent styling
      } catch (e) {
        // Fallback to system preference
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', prefersDark ? 'liquid-dark' : 'liquid-light');
        document.documentElement.classList.add('sea');
      }
    })();
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
