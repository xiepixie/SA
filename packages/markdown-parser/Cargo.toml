[package]
name = "markdown-parser"
version = "0.1.0"
edition = "2021"
description = "A Markdown parser with math syntax support, compiled to WASM"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1.0", features = ["derive"] }
markdown = "1.0.0-alpha.18"
serde-wasm-bindgen = "0.6"
regex = "1.10"
once_cell = "1.19"

[profile.release]
lto = true
opt-level = "s"
codegen-units = 1
panic = "abort"

[profile.dev]
opt-level = 0
